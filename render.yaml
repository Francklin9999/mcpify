# MCP Forge — Render Blueprint.  Deploy: push to GitHub, then "New > Blueprint" in
# Render and point it at this repo. Render builds each service from its Dockerfile.
#
# Inter-service URLs use Render's private network: hostname = service name, and
# Render injects PORT=10000 into web + private services, so they all listen on 10000.
#
# CAVEAT — artifacts: generated server .zip bundles are written to local disk
# (ARTIFACT_ROOT). Render disks can't be shared across services, so the web disk
# below holds what web serves. For production cross-service sharing, swap ARTIFACT_ROOT
# for object storage (S3/R2). The scrape→generate→Postgres pipeline works regardless.

databases:
  - name: mcp-postgres
    databaseName: mcp
    user: postgres
    plan: free

services:
  # ── Redis (BullMQ job queue) ──────────────────────────────────────────────
  - type: redis
    name: mcp-redis
    plan: free
    ipAllowList: []          # private network only

  # ── Web UI (Next.js, public) ──────────────────────────────────────────────
  - type: web
    name: web
    runtime: docker
    dockerfilePath: ./infra/docker/web.Dockerfile
    dockerContext: .
    plan: starter
    preDeployCommand: node packages/db/scripts/apply-migrations.mjs
    disk:
      name: artifacts
      mountPath: /data/artifacts
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: mcp-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: mcp-redis, property: connectionString }
      - key: ARTIFACT_ROOT
        value: /data/artifacts
      - fromGroup: mcp-secrets

  # ── Generator (BullMQ worker + enqueue API, private) ──────────────────────
  - type: pserv
    name: generator
    runtime: docker
    dockerfilePath: ./infra/docker/generator.Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: mcp-postgres, property: connectionString }
      - key: REDIS_URL
        fromService: { type: redis, name: mcp-redis, property: connectionString }
      - key: SCRAPER_URL
        value: http://scraper:10000      # ← change if scraper moves
      - key: ARTIFACT_ROOT
        value: /data/artifacts
      - fromGroup: mcp-secrets

  # ── Scraper (Playwright/Python, private) ──────────────────────────────────
  - type: pserv
    name: scraper
    runtime: docker
    dockerfilePath: ./infra/docker/scraper.Dockerfile
    dockerContext: .
    plan: starter

  # ── Monitor (Go poller, background worker) ────────────────────────────────
  - type: worker
    name: monitor
    runtime: docker
    dockerfilePath: ./infra/docker/monitor.Dockerfile
    dockerContext: .
    plan: starter
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: mcp-postgres, property: connectionString }
      - key: ENQUEUE_URL
        value: http://generator:10000/enqueue   # ← change if generator moves
      - key: POLL_INTERVAL
        value: 60s

# Fill these once in the Render dashboard; shared across services above.
envVarGroups:
  - name: mcp-secrets
    envVars:
      - key: LLM_PROVIDER
        value: openai
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-5.4
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
