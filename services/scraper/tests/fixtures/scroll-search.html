<!doctype html>
<html>
  <head><title>Scroll Search</title></head>
  <body>
    <!-- NOTHING fires on load. Endpoints fire ONLY on user interaction, so a passive (network_idle) capture
         misses them - this fixture proves the interaction pass (scroll / search-submit / load-more) surfaces them. -->
    <input type="search" name="q" placeholder="Search the catalog" />
    <button id="more">Load more</button>
    <div id="results">initial</div>
    <div style="height: 3000px"></div>
    <script>
      // Search-as-you-go: Enter in the search box hits /api/search.
      document.querySelector('input[name="q"]').addEventListener("keydown", function (ev) {
        if (ev.key === "Enter") {
          fetch("/api/search?q=" + encodeURIComponent(this.value)).then(function (r) { return r.json(); });
        }
      });
      // Infinite scroll: reaching the bottom hits /api/more.
      window.addEventListener("scroll", function () {
        if (window.scrollY + window.innerHeight >= document.body.scrollHeight - 10) {
          fetch("/api/more?page=2").then(function (r) { return r.json(); });
        }
      });
      // Explicit pagination: the "Load more" button hits /api/loadmore.
      document.getElementById("more").addEventListener("click", function () {
        fetch("/api/loadmore").then(function (r) { return r.json(); });
      });
    </script>
  </body>
</html>
