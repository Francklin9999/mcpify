<!doctype html>
<html>
  <head><title>SPA Fixture</title></head>
  <body>
    <input type="search" name="q" />
    <div id="out">loading...</div>
    <script>
      // Fires a load-time XHR the scraper must capture (the high-signal API call).
      fetch('/api/items/1')
        .then((r) => r.json())
        .then((d) => { document.getElementById('out').textContent = 'item:' + d.id; });
    </script>
  </body>
</html>
