# MCP Forge — Fly.io: generator (BullMQ worker + enqueue API, private).
# Reachable by the monitor at http://mcp-forge-generator.internal:8081/enqueue
# Deploy from the repo root:  fly deploy --config infra/fly/generator.fly.toml
# Secrets:  fly secrets set DATABASE_URL=... REDIS_URL=... ENQUEUE_TOKEN=... OPENAI_API_KEY=... -a mcp-forge-generator
app = "mcp-forge-generator"
primary_region = "iad"

[build]
  dockerfile = "infra/docker/generator.Dockerfile"

[env]
  ENQUEUE_PORT = "8081"
  SCRAPER_URL = "http://mcp-forge-scraper.internal:8000"   # ← change if scraper moves
  ARTIFACT_ROOT = "/data/artifacts"
  LLM_PROVIDER = "openai"
  OPENAI_MODEL = "gpt-5.4"

[[mounts]]
  source = "artifacts"
  destination = "/data/artifacts"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
