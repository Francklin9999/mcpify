# MCP Forge — Fly.io: web UI (public).
# Deploy from the repo root:  fly deploy --config infra/fly/web.fly.toml
# Secrets:  fly secrets set DATABASE_URL=... REDIS_URL=... OPENAI_API_KEY=... -a mcp-forge-web
app = "mcp-forge-web"
primary_region = "iad"

[build]
  dockerfile = "infra/docker/web.Dockerfile"

[env]
  PORT = "3001"
  HOSTNAME = "0.0.0.0"
  ARTIFACT_ROOT = "/data/artifacts"
  LLM_PROVIDER = "openai"
  OPENAI_MODEL = "gpt-5.4"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 1

[[mounts]]
  source = "artifacts"
  destination = "/data/artifacts"

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
