# Local dev infra for the data layer (docs/02-data-model.md).
#   docker compose -f infra/docker-compose.yml up -d
# Then: DATABASE_URL=postgres://postgres:postgres@localhost:5432/mcp npm run apply --workspace=@mcp/db
services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: mcp
    ports:
      # Bind to loopback only - Docker publishes to 0.0.0.0 by default, which would expose this dev DB
      # (default creds) to the whole LAN. localhost:5432 from the host still works.
      - "127.0.0.1:5432:5432"
    volumes:
      - mcp_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d mcp"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      # Loopback only (see postgres note) - don't expose the dev Redis to the LAN.
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  mcp_pg:
