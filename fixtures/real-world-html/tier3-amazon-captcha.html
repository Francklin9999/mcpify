<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Amazon.com</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
</head>
<body>
  <div class="a-container">
    <a href="/ref=cs_503_logo"><img src="/captcha-logo.png" alt="Amazon"></a>
    <div class="a-row a-spacing-double-large">
      <h4>Enter the characters you see below</h4>
      <p class="a-last">Sorry, we just need to make sure you're not a robot. For best results, please make sure your browser is accepting cookies.</p>
      <form method="get" action="/errors/validateCaptcha" name="">
        <div class="a-row a-text-center">
          <img src="https://images-na.ssl-images-amazon.com/captcha/abcd/Captcha_xyz.jpg">
        </div>
        <div class="a-row a-spacing-large">
          <div class="a-box">
            <h4>Type the characters you see in this image:</h4>
            <input type="text" autocomplete="off" spellcheck="false" id="captchacharacters" name="field-keywords" class="a-input-text">
          </div>
        </div>
        <button type="submit" class="a-button-text">Continue shopping</button>
      </form>
    </div>
    <p>To discuss automated access to Amazon data please contact api-services-support@amazon.com.</p>
  </div>
</body>
</html>
