<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MCP Forge</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup">
    <div class="popup-shell">
      <div class="popup-top">
        <div class="popup-title">
          <div class="logo"><span class="diamond">&#9670;</span> MCP Forge</div>
          <p class="sub">Chat with this page and let it do things for you. Everything runs in your browser and your logins stay private.</p>
        </div>
        <button id="theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"/></svg>
        </button>
      </div>

      <section class="popup-card popup-actions">
        <p class="eyebrow">Quick Actions</p>
        <button id="open" class="chip primary wide">Open page chat</button>
        <button id="gen" class="chip wide">Build tools for this tab</button>
        <div id="status" class="status"></div>
      </section>

      <div class="popup-foot">
        <span class="sub">Frutiger Aero extension UI</span>
        <a id="opts" class="link" href="#">Settings</a>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
