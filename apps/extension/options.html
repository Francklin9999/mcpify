<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>MCP Forge Settings</title>
    <link rel="stylesheet" href="ui.css" />
  </head>
  <body class="popup options-page">
    <div class="settings-shell">
      <div class="settings-top">
        <div class="settings-title">
          <div class="logo"><span class="diamond">&#9670;</span> MCP Forge Settings</div>
          <p class="sub">Where the web app is running. The extension only talks to this API.</p>
        </div>
        <button id="theme" class="icon-btn" title="Toggle theme" aria-label="Toggle theme">
          <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"/></svg>
        </button>
      </div>

      <section class="settings-card settings-grid">
        <div class="settings-section">
          <p class="eyebrow">Connection</p>
          <label class="field-group" for="api">
            <span class="field-label">API base URL</span>
            <input id="api" class="input" placeholder="http://localhost:3001" />
          </label>
        </div>

        <div class="settings-section">
          <p class="eyebrow">Storage</p>
          <p class="sub">MongoDB Atlas is optional. Generated tools can be stored per domain so repeat visits load instantly.</p>
          <label class="field-group" for="atlasEndpoint">
            <span class="field-label">Data API endpoint</span>
            <input id="atlasEndpoint" class="input" placeholder="https://data.mongodb-api.com/app/myapp-xxxxx/endpoint/data/v1" />
          </label>
          <label class="field-group" for="atlasApiKey">
            <span class="field-label">API key</span>
            <input id="atlasApiKey" class="input" type="password" placeholder="..." />
          </label>
          <label class="field-group" for="atlasDataSource">
            <span class="field-label">Cluster name</span>
            <input id="atlasDataSource" class="input" placeholder="Cluster0" />
          </label>
          <label class="field-group" for="atlasDatabase">
            <span class="field-label">Database</span>
            <input id="atlasDatabase" class="input" placeholder="mcp_forge" />
          </label>
          <label class="field-group" for="atlasCollection">
            <span class="field-label">Collection</span>
            <input id="atlasCollection" class="input" placeholder="tools" />
          </label>
        </div>

        <button id="save" class="chip primary wide">Save settings</button>
        <div id="status" class="status"></div>
      </section>
    </div>
    <script type="module" src="options.js"></script>
  </body>
</html>
