name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build (bundle the server)
        run: npm run build
      - name: Test the MCP server
        run: npm test --workspace=urlmcp

  dynamic-browser:
    name: Dynamic-website test (real Chromium)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Install Chromium for playwright-core
        run: npx --yes playwright-core install --with-deps chromium
      - name: Build the server
        run: npm run build
      - name: Drive a real browser against a local SPA (render + XHR capture + dynamic->tool)
        run: FORGE_TEST_LIVE_BROWSER=1 node services/forge-mcp-local/test/dynamic-live.mjs

  package-smoke:
    name: Verify urlmcp installs clean (npx-ready)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Bundle + pack
        run: |
          npm run bundle --workspace=urlmcp
          npm pack --workspace=urlmcp --pack-destination /tmp
      - name: Install the tarball into a clean project (no workspace deps)
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke && npm init -y >/dev/null
          npm install /tmp/urlmcp-*.tgz
      - name: Boot the installed server over stdio and assert its tools
        run: |
          cd /tmp/smoke
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | timeout 20 node node_modules/.bin/urlmcp > out.txt 2>/dev/null || true
          grep -q forge_scrape out.txt && grep -q forge_emit_server out.txt && grep -q forge_generate out.txt
          echo "OK: urlmcp installs clean and serves its tools."
