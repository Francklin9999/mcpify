name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    name: Build & test (Node)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build all workspaces
        run: npm run build
      - name: Test standalone MCP server (mcp-forge)
        run: npm test --workspace=mcp-forge
      - name: Typecheck Chrome extension
        run: npm run typecheck --workspace=@mcp/extension

  package-smoke:
    name: Verify mcp-forge installs clean (npx-ready)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Bundle + pack
        run: |
          npm run bundle --workspace=mcp-forge
          npm pack --workspace=mcp-forge --pack-destination /tmp
      - name: Install the tarball into a clean project (no workspace deps)
        run: |
          mkdir -p /tmp/smoke && cd /tmp/smoke && npm init -y >/dev/null
          npm install /tmp/mcp-forge-*.tgz
      - name: Boot the installed server over stdio and assert its tools
        run: |
          cd /tmp/smoke
          printf '%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"0"}}}' \
            '{"jsonrpc":"2.0","method":"notifications/initialized"}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | timeout 20 node node_modules/.bin/mcp-forge > out.txt 2>/dev/null || true
          grep -q forge_scrape out.txt && grep -q forge_emit_server out.txt && grep -q forge_generate out.txt
          echo "OK: mcp-forge installs clean and serves its tools."
